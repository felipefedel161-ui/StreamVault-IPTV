name: Build Android APK

on:
  workflow_dispatch: # Isso aqui permite você apertar um botão para compilar quando quiser

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Baixando o código
      uses: actions/checkout@v4

    - name: Configurando Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Dando permissão ao Gradle
      run: chmod +x gradlew

    - name: Compilando o APK (Debug)
      run: ./gradlew assembleDebug --stacktrace

    - name: Disponibilizando o APK para Download
      uses: actions/upload-artifact@v4
      with:
        name: StreamVault-APK-Pronto
        path: app/build/outputs/apk/debug/*.apk
